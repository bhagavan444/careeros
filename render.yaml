services:
  - type: web
    name: pathora-backend1
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    # Added --timeout-keep-alive 75 to prevent premature proxy kills during heavy processing
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 75
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "https://carrer-intelligence.vercel.app,http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173"
